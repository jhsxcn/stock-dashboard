name: 选股 + 部署
on:
  schedule:
    - cron: '5 9 * * 1-5'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 跑选股
        run: |
          echo "选股由热铁盒云函数运行"
          echo "此处只触发热铁盒部署"
      - name: 通知热铁盒部署
        env:
          RTH_KEY: ${{ secrets.RTH_API_KEY }}
        run: |
          curl -X POST "https://api.retiehe.com/v1/deploy" \
            -H "Authorization: Bearer $RTH_KEY" \
            -H "Content-Type: application/json" \
            -d '{"project":"stock-dashboard"}'
