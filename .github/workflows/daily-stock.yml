name: 选股
on:
  schedule:
    - cron: '5 9 * * 1-5'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 占位
        run: echo '<h1>选股数据由电脑推送</h1>' > index.html
      - name: 提交
        run: |
          git config user.name "bot"
          git config user.email "bot@x.com"
          git add -A
          git commit -m "占位" || true
          git push || true
